<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="12" fill="#0F172A"/>

  <!-- Subtle grid lines -->
  <line x1="8" y1="46" x2="56" y2="46" stroke="#1E3A5F" stroke-width="0.75"/>
  <line x1="8" y1="34" x2="56" y2="34" stroke="#1E3A5F" stroke-width="0.75"/>
  <line x1="8" y1="22" x2="56" y2="22" stroke="#1E3A5F" stroke-width="0.75"/>

  <!-- Vertical axis -->
  <line x1="8" y1="14" x2="8" y2="54" stroke="#2D4A6B" stroke-width="1"/>
  <!-- Horizontal axis / baseline -->
  <line x1="8" y1="54" x2="58" y2="54" stroke="#2D4A6B" stroke-width="1"/>

  <!-- Bars (ascending to signal portfolio growth) -->
  <rect x="11" y="44" width="7" height="10" rx="1.5" fill="#1D4ED8" opacity="0.85"/>
  <rect x="21" y="39" width="7" height="15" rx="1.5" fill="#1D4ED8" opacity="0.85"/>
  <rect x="31" y="31" width="7" height="23" rx="1.5" fill="#2563EB" opacity="0.9"/>
  <rect x="41" y="24" width="7" height="30" rx="1.5" fill="#0EA5E9" opacity="0.9"/>

  <!-- Highlight cap on the tallest bar -->
  <rect x="41" y="24" width="7" height="3" rx="1.5" fill="#38BDF8"/>

  <!-- Trend line (golden) — ends at arrowhead base -->
  <polyline
    points="14.5,42  24.5,36  34.5,27  44.5,21"
    fill="none"
    stroke="#F59E0B"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Data-point dots -->
  <circle cx="14.5" cy="42" r="2.2" fill="#FCD34D" stroke="#0F172A" stroke-width="0.8"/>
  <circle cx="24.5" cy="36" r="2.2" fill="#FCD34D" stroke="#0F172A" stroke-width="0.8"/>
  <circle cx="34.5" cy="27" r="2.2" fill="#FCD34D" stroke="#0F172A" stroke-width="0.8"/>

  <!-- Solid filled arrowhead aligned with trend-line direction (dx=30, dy=-21) -->
  <polygon points="52,16 42,17 47,25" fill="#F59E0B"/>

  <!-- Small "tick" marks on vertical axis -->
  <line x1="6" y1="46" x2="8" y2="46" stroke="#2D4A6B" stroke-width="1"/>
  <line x1="6" y1="34" x2="8" y2="34" stroke="#2D4A6B" stroke-width="1"/>
  <line x1="6" y1="22" x2="8" y2="22" stroke="#2D4A6B" stroke-width="1"/>
</svg>
